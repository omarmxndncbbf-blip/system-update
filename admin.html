<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OMAR INTEL | COMMAND CENTER</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { margin:0; background:#000b14; color:#00ffcc; font-family:sans-serif; display:flex; flex-direction:column; height:100vh; }
        #map { flex:2; border-bottom:2px solid #00ffcc; }
        .panel { flex:1; background:#001a1a; overflow-y:auto; padding:10px; }
        table { width:100%; border-collapse:collapse; text-align:center; }
        th, td { border:1px solid #004d40; padding:10px; font-size:12px; }
        .high-acc { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="panel">
        <h3 style="margin:0 0 10px 0;">📡 رادار الأجهزة النشطة</h3>
        <table>
            <thead><tr><th>الجهاز</th><th>الموقع</th><th>الدقة</th><th>التوقيت</th></tr></thead>
            <tbody id="logs"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBCCXqcD29paJYKGI6eevmUuRa4bW11ccU",
            databaseURL: "https://omar-store-2025-default-rtdb.firebaseio.com",
            projectId: "omar-store-2025",
            appId: "1:1073673986144:web:a27de784d878f3d5d5a305"
        };
        firebase.initializeApp(firebaseConfig);

        var map = L.map('map').setView([30.0444, 31.2357], 12);
        
        // خريطة قمر صناعي من جوجل بأسماء عربية
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}&hl=ar').addTo(map);

        var markers = {};
        var circles = {};

        firebase.database().ref('tracking').on('value', (snap) => {
            const data = snap.val();
            const logs = document.getElementById('logs');
            logs.innerHTML = "";
            
            for (let id in data) {
                const d = data[id];
                const pos = [d.lat, d.lng];

                if (markers[id]) {
                    markers[id].setLatLng(pos);
                    circles[id].setLatLng(pos).setRadius(d.acc);
                } else {
                    markers[id] = L.marker(pos).addTo(map).bindPopup(d.device);
                    circles[id] = L.circle(pos, {radius: d.acc, color: '#00ffcc', fillOpacity: 0.2}).addTo(map);
                }

                logs.innerHTML += `<tr>
                    <td><b>${d.device}</b></td>
                    <td>${d.lat.toFixed(6)}, ${d.lng.toFixed(6)}</td>
                    <td class="${d.acc < 10 ? 'high-acc' : ''}">${d.acc} متر</td>
                    <td>${d.time}</td>
                </tr>`;
            }
        });
    </script>
</body>
</html>
